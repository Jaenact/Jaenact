name: Update Merged PRs

on:
  schedule:
    - cron: "0 */12 * * *"   # 12시간마다
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-merged-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build merged PR list via GitHub GraphQL
        id: prlist
        uses: actions/github-script@v7
        with:
          script: |
            const username = "Jaenact";
            const query = `
              query($q: String!, $first: Int!) {
                search(type: ISSUE, query: $q, first: $first) {
                  nodes {
                    ... on PullRequest {
                      title
                      url
                      repository { nameWithOwner }
                      mergedAt
                    }
                  }
                }
              }
            `;
            const q = `is:pr is:merged author:${username} sort:updated-desc`;
            const res = await github.graphql(query, { q, first: 10 });
            const items = res.search.nodes.map(pr => {
              const d = new Date(pr.mergedAt).toISOString().slice(0,10);
              return `- [${pr.title}](${pr.url}) — ${pr.repository.nameWithOwner} · ${d}`;
            });
            core.setOutput("list", items.join("\n"));

      - name: Update README section
        run: |
          LIST="${{ steps.prlist.outputs.list }}"
          FILE="README.md"
          START="<!--MERGED_PR_LIST_START-->"
          END="<!--MERGED_PR_LIST_END-->"
          awk -v start="$START" -v end="$END" -v content="$LIST" '
            { 
              if ($0 ~ start) { print; print content; skip=1; next }
              if ($0 ~ end)   { skip=0 }
              if (!skip) print
            }' "$FILE" > README.tmp
          mv README.tmp "$FILE"

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore(readme): update merged PRs"
          git push
